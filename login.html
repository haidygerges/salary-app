<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Salary App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="min-h-screen bg-gray-950 flex items-center justify-center relative overflow-hidden">
   
    <div class="orb-abs w-96 h-96 bg-emerald-400 -top-20 -left-20"></div>
    <div class="orb-abs w-80 h-80 bg-blue-500 bottom-10 right-10"></div>
    <div class="orb-abs w-64 h-64 bg-purple-500 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>

    <div class="glass-login rounded-3xl p-10 w-full max-w-md relative z-10 shadow-2xl">
        
        <div class="flex justify-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-emerald-400 to-blue-500 flex items-center justify-center shadow-lg">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
        </div>

        <h1 class="text-3xl font-700 text-white text-center mb-1 font-semibold tracking-tight">Welcome back</h1>
        <p class="text-center text-white/40 text-sm mb-8">Sign in to your Salary App account</p>

        <form class="space-y-4">
            <div>
                <label class="block text-white/60 text-xs font-medium mb-2 uppercase tracking-widest">Username</label>
                <input type="text" id="name" class="input-field w-full px-4 py-3 rounded-xl text-sm" placeholder="Enter your name">
            </div>
            <div>
                <label class="block text-white/60 text-xs font-medium mb-2 uppercase tracking-widest">Password</label>
                <input type="password" id="password" class="input-field w-full px-4 py-3 rounded-xl text-sm" placeholder="Enter your password">
            </div>

            <div class="pt-2">
                <button type="button" class="btn-login w-full py-3 rounded-xl text-white font-semibold text-sm tracking-wide shadow-lg">
                    Sign In →
                </button>
            </div>
        </form>

    
    </div>

    <script src="js/login.js"></script>
</body>
</html>
