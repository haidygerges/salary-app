<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary App — Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="min-h-screen bg-gray-950 text-white relative">
    
    <div class="orb w-96 h-96 bg-emerald-400 -top-20 -right-20"></div>
    <div class="orb w-80 h-80 bg-blue-500 bottom-0 left-0"></div>

    
    <header class="sticky top-0 z-50 border-b border-white/10" style="background: rgba(10,12,20,0.85); backdrop-filter: blur(20px);">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-emerald-400 to-blue-500 flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <span class="font-semibold text-lg tracking-tight">Salary<span class="text-emerald-400">App</span></span>
            </div>
            <button type="button" onclick="logout()" class="btn-logout px-4 py-2 rounded-xl text-sm font-medium flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                </svg>
                Logout
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">
        
        <div class="glass rounded-2xl p-6 mb-8">
            <h2 class="text-lg font-semibold mb-1">Add New Employee</h2>
            <p class="text-white/40 text-sm mb-6">Fill in the details to calculate salary</p>

            <form class="space-y-4">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="section-label block mb-2">Employee Name</label>
                        <input type="text" id="name" class="input-field w-full px-4 py-2.5 rounded-xl text-sm" placeholder="e.g. Ahmed Mohamed">
                    </div>
                    <div>
                        <label class="section-label block mb-2">Basic Salary</label>
                        <input type="text" id="basic" class="input-field w-full px-4 py-2.5 rounded-xl text-sm" placeholder="e.g. 5000">
                    </div>
                </div>

                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="section-label block mb-2">Bonus</label>
                        <input type="text" id="bonus" class="input-field w-full px-4 py-2.5 rounded-xl text-sm" placeholder="e.g. 500">
                    </div>
                    <div>
                        <label class="section-label block mb-2">Penalty</label>
                        <input type="text" id="Penalty" class="input-field w-full px-4 py-2.5 rounded-xl text-sm" placeholder="e.g. 200">
                    </div>
                </div>

               
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="section-label block mb-2">Extra Hours</label>
                        <input type="text" id="extra" class="input-field w-full px-4 py-2.5 rounded-xl text-sm" placeholder="e.g. 10">
                    </div>
                    <div>
                        <label class="section-label block mb-2">Job Title</label>
                        <div class="relative">
                            <select id="jobTitle" class="select-field w-full px-4 py-2.5 rounded-xl text-sm cursor-pointer">
                                <option value="Operator">Operator</option>
                                <option value="Salesman">Salesman</option>
                                <option value="Admin">Admin</option>
                            </select>
                            <div class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-white/40">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                            </div>
                        </div>
                    </div>
                </div>

               
                <div>
                    <label class="section-label block mb-2">Currency</label>
                    <div class="relative">
                        <select id="currency" class="select-field w-full px-4 py-2.5 rounded-xl text-sm cursor-pointer">
                            <option value="USD">🇺🇸 US Dollar (USD)</option>
                            <option value="SAR">🇸🇦 Saudi Riyal (SAR)</option>
                            <option value="GBP">🇬🇧 British Pound (GBP)</option>
                            <option value="EUR">🇪🇺 Euro (EUR)</option>
                        </select>
                        <div class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-white/40">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                        </div>
                    </div>
                </div>

                
                <div class="flex flex-wrap gap-3 pt-2">
                    <button type="button" class="btn-add px-6 py-2.5 rounded-xl text-white text-sm font-semibold flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        Add Employee
                        <span class="loading text-xs">Processing...</span>
                    </button>
                    <button type="button" class="btn-clear px-6 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        Clear All
                    </button>
                </div>
            </form>
        </div>

       
        <div class="glass rounded-2xl overflow-hidden">
            <div class="px-6 py-4 border-b border-white/10 flex items-center justify-between">
                <div>
                    <h2 class="text-lg font-semibold">Employee Records</h2>
                    <p class="text-white/40 text-sm">All salary calculations in EGP</p>
                </div>
                <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
            </div>
            <div class="overflow-x-auto">
                <table class="data-table w-full">
                    <thead>
                        <tr>
                            <th rowspan="2">Name</th>
                            <th rowspan="2">Basic</th>
                            <th rowspan="2">Bonus</th>
                            <th rowspan="2">Penalty</th>
                            <th colspan="3" style="border-left: 1px solid rgba(110,231,183,0.2);">Extra Hours</th>
                            <th rowspan="2" style="border-left: 1px solid rgba(110,231,183,0.2);">Gross</th>
                            <th colspan="2" style="border-left: 1px solid rgba(110,231,183,0.2);">Taxes</th>
                            <th rowspan="2" style="border-left: 1px solid rgba(110,231,183,0.2);">Net Salary</th>
                        </tr>
                        <tr>
                            <th style="border-left: 1px solid rgba(110,231,183,0.2);">No. of Hours</th>
                            <th>Hour Value</th>
                            <th>Total</th>
                            <th style="border-left: 1px solid rgba(110,231,183,0.2);">Rate</th>
                            <th>Value</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                
                <div id="emptyState" class="text-center py-16 text-white/25">
                    <svg class="w-12 h-12 mx-auto mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    <p class="text-sm">No employees added yet</p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/functions.js"></script>
    <script src="js/main.js"></script>
    <script src="js/logout.js"></script>
</body>
</html>
